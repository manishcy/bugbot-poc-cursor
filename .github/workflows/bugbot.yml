name: BugBot PR Review

on:
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm install

      - name: Run BugBot
        run: node bot/bugbot.js
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}